name: GitHub Pagesにデプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存パッケージインストール
        run: npm install

      - name: フロントエンドビルド
        run: npx vite build
        env:
          GITHUB_PAGES: "true"
          VITE_GH_OWNER: ${{ secrets.GH_OWNER }}
          VITE_GH_REPO: ${{ secrets.GH_REPO }}
          VITE_GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: GitHub Pages設定
        uses: actions/configure-pages@v4

      - name: アーティファクトアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
